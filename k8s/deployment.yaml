apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection
  namespace: fraud-detection

spec:
  replicas: 3

  selector:
    matchLabels:
      app: fraud-detection

  template:
    metadata:
      labels:
        app: fraud-detection

    spec:
      containers:
      - name: fraud-detection
        image: roha1234/fraud-detection:latest

        ports:
        - containerPort: 8000
